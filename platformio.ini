; ePaper Stock Ticker — PlatformIO project
; Board A: XIAO ESP32-C3 + 7.5" external ePaper panel
; Board B: Seeed reTerminal E1001 (XIAO ESP32-S3, internal ePaper)
;
; Build the correct environment for your hardware:
;   pio run -e board-a   (Board A)
;   pio run -e board-b   (Board B)
;
; NOTE (PRD §2.2): Board B uses GxEPD2 rather than Seeed's primary Seeed_GFX path.
; This is intentional to share the rendering codebase with Board A. If GxEPD2 support
; for the E1001 proves thin or buggy, fall back to Seeed_GFX for Board B and accept
; a small amount of diverged rendering code.

[platformio]
default_envs = board-a

[base_common]
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DENABLE_GxEPD2_GFX=1
lib_deps =
    ZinggJM/GxEPD2@^1.6.2
    bblanchon/ArduinoJson@^7.3.0

[env:board-a]
; XIAO ESP32-C3, external 7.5" ePaper panel
; Upload: XIAO uses native USB CDC — DTR/RTS auto-reset doesn't work on Windows.
; Manually enter bootloader (hold BOOT, press RST, release BOOT) then upload.
extends = base_common
platform = espressif32
board = seeed_xiao_esp32c3
build_flags =
    ${base_common.build_flags}
    -DBOARD_BUILD_A
upload_protocol = esp-builtin

[env:board-b]
; reTerminal E1001, internal 7.5" ePaper panel (XIAO ESP32-S3 inside)
extends = base_common
platform = espressif32
board = seeed_xiao_esp32s3
build_flags =
    ${base_common.build_flags}
    -DBOARD_BUILD_B
